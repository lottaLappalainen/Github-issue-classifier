name: MLOps CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Force model retrain'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: "3.10"
  MLFLOW_TRACKING_URI: "mlruns"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint + Tests  (every push)
  # ─────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # JOB 2: Train & Evaluate  (every push)
  # ─────────────────────────────────────────────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch GitHub issues (Bronze layer)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/data/ingest.py --pages 3

      - name: Clean data (Silver layer)
        run: python src/data/clean.py

      - name: Featurize (Gold layer)
        run: python src/data/featurize.py

      # ── Drift monitoring ───────────────────────────────────────────────
      # First run: creates baseline_meta.json + baseline_vocab.json, exits clean.
      # Subsequent runs: compares against baseline, writes drift_report.json.
      - name: Run drift monitor
        run: python src/monitoring/monitor.py --text-drift

      # ── Retrain trigger (dry-run in CI) ────────────────────────────────
      # Reads drift_report.json and logs whether a retrain WOULD be triggered.
      # --dry-run means it never actually retrains here (train step above
      # already did that). This step closes the CT loop by making the
      # trigger decision visible in the CI log as evidence.
      - name: Check retrain trigger (dry-run)
        run: |
          python src/monitoring/retrain_trigger.py --dry-run
          echo "=== Drift Report ==="
          cat monitoring/drift_report.json || echo "No drift report yet"
        continue-on-error: true

      - name: Train models and log to MLflow
        run: python src/models/train.py

      # ── Evaluate + version comparison ──────────────────────────────────
      # Always produces monitoring/version_comparison.json comparing all
      # MLflow runs across data versions — required assignment evidence.
      - name: Evaluate model + produce version comparison
        run: python src/models/evaluate.py

      - name: Show version comparison
        run: |
          echo "=== Model Version Comparison ==="
          cat monitoring/version_comparison.json || echo "No comparison yet"

      # ── Quality gate (reads params.yaml ci_threshold) ──────────────────
      - name: Check model quality gate
        run: |
          python - <<'EOF'
          import json, sys, yaml
          from pathlib import Path

          metrics_file = Path("metrics.json")
          if not metrics_file.exists():
              print("No metrics.json — skipping quality gate")
              sys.exit(0)

          metrics = json.loads(metrics_file.read_text())
          f1      = metrics.get("f1_macro", 0)

          # Read threshold from params.yaml so it's version-controlled
          params_file = Path("params.yaml")
          threshold = 0.60
          if params_file.exists():
              with open(params_file) as pf:
                  p = yaml.safe_load(pf)
              threshold = p.get("train", {}).get("ci_threshold", 0.60)

          print(f"F1 macro: {f1:.4f}  |  CI threshold: {threshold}")
          if f1 < threshold:
              print(f"FAIL: F1 {f1:.4f} below threshold {threshold}")
              sys.exit(1)
          else:
              print(f"PASS: F1 {f1:.4f} above threshold {threshold}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/best_model.joblib
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: version-comparison
          path: monitoring/version_comparison.json
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: monitoring/drift_report.json
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: data/predictions.csv
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # JOB 3: Build Docker image  (every push, after train)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Build Docker image
        run: |
          docker build -t github-issue-classifier:${{ github.sha }} .
          docker build -t github-issue-classifier:latest .

      - name: Smoke test — /health responds
        run: |
          docker run -d --name test-api \
            -p 8000:8000 \
            github-issue-classifier:latest
          sleep 8
          curl -f http://localhost:8000/health && echo "Health check PASSED"
          docker stop test-api