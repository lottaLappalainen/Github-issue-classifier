stages:
  ingest:
    cmd: python src/data/ingest.py
    deps:
      - src/data/ingest.py
    outs:
      - data/bronze/issues_raw.parquet
    always_changed: true   # re-run on every dvc repro (live API)

  clean:
    cmd: python src/data/clean.py
    deps:
      - src/data/clean.py
      - data/bronze/issues_raw.parquet
    outs:
      - data/silver/issues_clean.parquet

  featurize:
    cmd: python src/data/featurize.py
    deps:
      - src/data/featurize.py
      - data/silver/issues_clean.parquet
    outs:
      - data/gold/train.parquet
      - data/gold/test.parquet
      - data/gold/meta.json
    params:
      - params.yaml:
          - featurize.test_size

  # ── NEW: drift monitoring runs after every featurize ──────────────────
  # Writes monitoring/drift_report.json.
  # Does NOT block the pipeline — train reads drift_report.json itself
  # and the CI/CD workflow decides whether to proceed.
  monitor:
    cmd: python src/monitoring/monitor.py
    deps:
      - src/monitoring/monitor.py
      - data/gold/meta.json          # re-runs whenever Gold changes
    outs:
      - monitoring/drift_report.json:
          cache: false               # always written fresh, not DVC-cached

  train:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - data/gold/train.parquet
      - data/gold/test.parquet
      - monitoring/drift_report.json # train depends on monitor completing
    outs:
      - models/best_model.joblib
    metrics:
      - metrics.json:
          cache: false
    params:
      - params.yaml:
          - train.max_features
          - train.ngram_range
          - train.C

  evaluate:
    cmd: python src/models/evaluate.py --output data/predictions.csv
    deps:
      - src/models/evaluate.py
      - models/best_model.joblib
      - data/gold/test.parquet
    outs:
      - data/predictions.csv:
          cache: false